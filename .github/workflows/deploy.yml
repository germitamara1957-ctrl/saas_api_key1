name: Deploy to VPS

# Auto-deploy on every push to main.
#
# REQUIRED GitHub repository secrets (add via Settings → Secrets and variables → Actions):
#   VPS_HOST            — IP or hostname of your VPS (e.g. 203.0.113.10)
#   VPS_USER            — SSH user (e.g. root or deploy)
#   VPS_SSH_KEY         — Private SSH key content (the matching public key must be in the VPS ~/.ssh/authorized_keys)
#   VPS_APP_DIR         — Absolute path on the VPS (e.g. /opt/ai-gateway)
#
# This workflow is gated: it only runs when VPS_HOST is configured, so the
# repo is safe to fork/clone without auto-deploys triggering.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.VPS_DEPLOY_ENABLED == 'true' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_APP_DIR }}
            git pull origin main
            bash deploy.sh --build --restart
